---
# Auth Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: adventuretube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      nodeSelector:
        kubernetes.io/hostname: strider-pi2
      initContainers:
      - name: wait-for-config
        image: busybox
        command: ['sh', '-c', 'until wget -q -O- http://192.168.1.199:30297/actuator/health | grep -q "UP"; do echo "Waiting for config-service..."; sleep 5; done']
      - name: wait-for-eureka
        image: busybox
        command: ['sh', '-c', 'until wget -q -O- http://192.168.1.199:30761/actuator/health | grep -q "UP"; do echo "Waiting for eureka-server..."; sleep 5; done']
      containers:
      - name: auth-service
        image: docker.io/library/adventuretube-microservice-auth-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 30010
        - containerPort: 5005
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "pi2"
        - name: ENV_TARGET
          value: "pi2"
        - name: JAVA_TOOL_OPTIONS
          value: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
        - name: JAVA_DEBUG_PORT
          value: "5005"
        - name: CONFIG_SERVER_URL
          value: "http://192.168.1.199:30297"
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 30010
          initialDelaySeconds: 45
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 30010
          initialDelaySeconds: 90
          periodSeconds: 15
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: adventuretube
spec:
  type: NodePort
  selector:
    app: auth-service
  ports:
  - name: http
    port: 30010
    targetPort: 30010
    nodePort: 30010
  - name: debug
    port: 5005
    targetPort: 5005
    nodePort: 30011
