---
# Auth Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: adventuretube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      nodeSelector:
        kubernetes.io/hostname: strider-pi2
      containers:
      - name: auth-service
        image: docker.io/library/adventuretube-microservice-auth-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 30010
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "pi2"
        - name: ENV_TARGET
          value: "pi2"
        - name: CONFIG_SERVER_URL
          value: "http://192.168.1.199:30297"
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 30010
          initialDelaySeconds: 45
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 30010
          initialDelaySeconds: 90
          periodSeconds: 15
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: adventuretube
spec:
  type: NodePort
  selector:
    app: auth-service
  ports:
  - name: http
    port: 30010
    targetPort: 30010
    nodePort: 30010
