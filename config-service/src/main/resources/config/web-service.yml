server:
  port: ${WEB_SERVICE_PORT}

spring:
  # Network interface selection for Eureka registration
  # Problem: Mac has multiple network interfaces (WiFi, Thunderbolt, Docker, etc.)
  # Eureka may auto-detect wrong IP (e.g., 169.254.x.x link-local address)
  # Solution: Force Spring to use 192.168.1.x network and ignore virtual interfaces
  cloud:
    inetutils:
      preferred-networks:
        - 192.168.1
      ignored-interfaces:
        - en14          # Thunderbolt/USB adapter (link-local 169.254.x.x)
        - docker*       # Docker virtual interfaces
        - veth*         # Docker container interfaces
        - br-*          # Docker bridge interfaces

#in here hostname and ip address id where the this submodule is running
#which is case of direct connection from the mac to the pi HOST_IP should eureka clinet ip address which is mac local network ip address
#instead ip address of pi
eureka:
  instance:
    prefer-ip-address: true   # Forces Eureka to use IP instead of hostname
    ip-address: ${HOST_IP}  # Uses the correct network IP WHERE THIS SERVICE IS RUNNIN
    hostname: ${HOST_IP}    # Ensure consistency
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}
    fetch-registry: true
    register-with-eureka: true
    enabled: true


logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
  level:
    root: INFO
    com.netflix.discovery.DiscoveryClient: WARN  # Skip debug messages for DiscoveryClient
    com.adventuretube.member: DEBUG  # Ensure debug messages for member-service

# Circuit Breaker (Resilience4j) configuration
resilience4j:
  circuitbreaker:
    instances:
      GEOSPATIAL-SERVICE:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  timelimiter:
    instances:
      GEOSPATIAL-SERVICE:
        timeout-duration: 5s

# Actuator endpoints for circuit breaker monitoring + distributed tracing
management:
  endpoints:
    web:
      exposure:
        include: health,circuitbreakers,circuitbreakerevents,metrics
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL}/api/v2/spans

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html



