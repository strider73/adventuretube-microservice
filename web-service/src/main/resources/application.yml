spring:
  application:
    name: web-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL}
  devtools:
    restart:
      enabled: true

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://192.168.1.199:9411}/api/v2/spans