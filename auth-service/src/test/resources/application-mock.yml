server:
  port: 0

spring:
  application:
    name: auth-service
  config:
    import: ""
  devtools:
    restart:
      enabled: false
  cloud:
    config:
      enabled: false
    loadbalancer:
      enabled: false
    service-registry:
      auto-registration:
        enabled: false

eureka:
  client:
    enabled: false

jwt:
  secret: ${JWT_SECRET}
  expiration:
   access-token: ${ACCESS_TOKEN_EXPIRATION}
   refresh-token: ${REFRESH_TOKEN_EXPIRATION}

google:
  client-id: ${GOOGLE_CLIENT_ID}
  client-secret: ${GOOGLE_CLIENT_SECRET}


