server:
  port: 0

spring:
  application:
    name: geospatial-service
  config:
    import: ""
  devtools:
    restart:
      enabled: false
  data:
    mongodb:
      uri: mongodb://localhost:27017/test
      auto-index-creation: false
  cloud:
    config:
      enabled: false
    loadbalancer:
      enabled: false
    service-registry:
      auto-registration:
        enabled: false

eureka:
  client:
    enabled: false
